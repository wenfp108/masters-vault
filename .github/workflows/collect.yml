name: Daily Collect

on:
  schedule:
    - cron: '37 3 * * *'  # 北京时间 11:37
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests pyyaml beautifulsoup4 feedparser yt-dlp

      - name: Run Collector
        run: python collector.py

      - name: Push Raw Data to Masters-Council
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python push.py --raw-only
